services:

  gateway:
    build:
      context: ./apps/backend-node
      dockerfile: Dockerfile
    container_name: unideploy-gateway
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
        NEXT_PUBLIC_APP_URL: http://localhost:3000
        NEXT_PUBLIC_WS_URL: ws://localhost:3001
    container_name: unideploy-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./apps/frontend/.env.local
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
