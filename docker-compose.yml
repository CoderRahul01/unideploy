version: '3.8'

services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: unideploy-brain
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./apps/backend/local_storage:/app/local_storage
      - ./temp:/app/temp
    env_file:
      - ./apps/backend/.env
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    networks:
      - unideploy-network

  gateway:
    build:
      context: ./apps/gateway
    container_name: unideploy-gateway
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./apps/gateway/.env
    environment:
      - PORT=3001
      - NODE_ENV=production
      - ALLOWED_ORIGINS=http://localhost:3000,https://unideploy.in,https://www.unideploy.in
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    networks:
      - unideploy-network

networks:
  unideploy-network:
    driver: bridge
