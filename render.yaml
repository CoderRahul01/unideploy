services:
  - type: web
    name: unideploy-gateway
    runtime: node
    rootDir: apps/backend-node
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      # Set these in the Render dashboard → Environment tab after first deploy:
      - key: FRONTEND_URL
        sync: false        # e.g. https://app.unideploy.in
      - key: INSFORGE_PROJECT_ID
        sync: false
      - key: INSFORGE_API_KEY
        sync: false
      - key: INSFORGE_BASE_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: DODO_PAYMENTS_API_KEY
        sync: false
      - key: DODO_WEBHOOK_SECRET
        sync: false
      - key: DODO_CHECKOUT_BUILDER_MONTHLY
        sync: false
      - key: DODO_CHECKOUT_BUILDER_ANNUAL
        sync: false
      - key: DODO_CHECKOUT_PRO_MONTHLY
        sync: false
      - key: DODO_CHECKOUT_PRO_ANNUAL
        sync: false
      - key: DODO_CHECKOUT_ENTERPRISE_MONTHLY
        sync: false
      - key: DODO_CHECKOUT_ENTERPRISE_ANNUAL
        sync: false
